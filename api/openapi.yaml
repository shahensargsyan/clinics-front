  securitySchemes:
    bearerAuth:
      bearerFormat: JWT
      description: 'JWT issued by `POST /auth/login` (defined in a later sub-step).

        The token''s signing key and TTL come from `JWT_SECRET` / `JWT_TTL`

        in the shared `.env` file.

        '
      scheme: bearer
      type: http
info:
  description: "Go (Gin + GORM) backend replacing the Laravel/Backpack admin for the\nclinics project.\
    \ This document is the single source of truth for the\nHTTP contract; `oapi-codegen` consumes it to\
    \ produce the server\ninterface implemented in `internal/api/`.\n\n## Conventions\n- **Pagination.**\
    \ Use `page` (1-indexed) and `per_page`. Responses\n  always include a `meta` object: `current_page`,\
    \ `per_page`, `total`,\n  `last_page`.\n- **Search.** A single `search` query parameter performs a\n\
    \  case-insensitive substring match across each resource's documented\n  searchable columns (see the\
    \ endpoint description).\n- **Sort.** `sort=column` for ascending, `sort=-column` for descending.\n\
    - **Update semantics.** `PUT` accepts a **partial** body — only the\n  keys present are updated. This\
    \ intentionally mirrors the existing\n  Backpack admin behaviour rather than strict REST replace semantics.\n\
    - **Errors.** 422 responses follow Laravel's shape\n  (`{ message, errors: { field: [msg, ...] } }`)\
    \ so the existing\n  frontend's validation-display code keeps working.\n"
  title: Clinics API
  version: 0.1.0
openapi: 3.0.3
paths:
  /appointments:
    get:
      description: '`search` matches against `reason_for_visit` (case-insensitive LIKE).


        Sortable columns: `id`, `appointment_date_time`, `duration_minutes`,

        `status`, `created_at`, `updated_at`.


        All filter params (`status`, `patient_id`, `user_id`) are

        combinable (AND).

        '
      operationId: ListAppointments
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PerPage'
      - $ref: '#/components/parameters/Search'
      - $ref: '#/components/parameters/Sort'
      - in: query
        name: status
        schema:
          enum:
          - Scheduled
          - Confirmed
          - Completed
          - Cancelled
          type: string
      - in: query
        name: patient_id
        schema:
          format: int64
          minimum: 1
          type: integer
      - in: query
        name: user_id
        schema:
          format: int64
          minimum: 1
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAppointments'
          description: Paginated appointment list.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      summary: List appointments with pagination, search, sort, and filters.
      tags:
      - Appointments
    post:
      operationId: CreateAppointment
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppointmentCreate'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppointmentEnvelope'
          description: Appointment created.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
      summary: Create a new appointment.
      tags:
      - Appointments
  /appointments/{id}:
    delete:
      operationId: DeleteAppointment
      responses:
        '204':
          description: Deleted.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      summary: Soft-delete an appointment.
      tags:
      - Appointments
    get:
      operationId: GetAppointment
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppointmentEnvelope'
          description: ok
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      summary: Fetch a single appointment by id.
      tags:
      - Appointments
    parameters:
    - $ref: '#/components/parameters/AppointmentId'
    put:
      operationId: UpdateAppointment
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppointmentUpdate'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppointmentEnvelope'
          description: Appointment updated.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
      summary: Update an appointment (partial merge).
      tags:
      - Appointments
  /auth/login:
    post:
      description: 'Mirrors Laravel''s `Auth::guard(''api'')->attempt([username, password])`

        flow: the `username` field is the user''s email address (named so for

        wire compatibility with the existing frontend''s login form).

        '
      operationId: LoginUser
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
          description: Authenticated.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
      security: []
      summary: Authenticate and receive a JWT.
      tags:
      - Auth
  /categories:
    get:
      operationId: ListCategories
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PerPage'
      - $ref: '#/components/parameters/Search'
