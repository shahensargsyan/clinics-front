components:
  parameters:
    AppointmentId:
      description: Appointment ID.
      in: path
      name: id
      required: true
      schema:
        format: int64
        minimum: 1
        type: integer
    CategoryId:
      in: path
      name: id
      required: true
      schema:
        format: int64
        minimum: 1
        type: integer
    ClinicalRecordId:
      description: Polymorphic clinical-record id — shared by cephalometric_analyses, diagnostic_assets,
        mechanotherapy_visits, tooth_measurements, orthodontics_medical_histories.
      in: path
      name: id
      required: true
      schema:
        format: int64
        minimum: 1
        type: integer
    InvoiceId:
      description: Invoice ID.
      in: path
      name: id
      required: true
      schema:
        format: int64
        minimum: 1
        type: integer
    MedicalHistoryId:
      in: path
      name: id
      required: true
      schema:
        format: int64
        minimum: 1
        type: integer
    Page:
      description: 1-indexed page number.
      in: query
      name: page
      schema:
        default: 1
        minimum: 1
        type: integer
    PatientId:
      description: Patient ID.
      in: path
      name: id
      required: true
      schema:
        format: int64
        minimum: 1
        type: integer
    PerPage:
      description: Page size.
      in: query
      name: per_page
      schema:
        default: 25
        maximum: 100
        minimum: 1
        type: integer
    Search:
      description: Case-insensitive substring match across the resource's searchable columns.
      in: query
      name: search
      schema:
        type: string
    Sort:
      description: Column to sort by. Prefix with `-` for descending (e.g. `-created_at`).
      in: query
      name: sort
      schema:
        type: string
    TreatmentId:
      in: path
      name: id
      required: true
      schema:
        format: int64
        minimum: 1
        type: integer
    UserId:
      in: path
      name: id
      required: true
      schema:
        format: int64
        minimum: 1
        type: integer
    VisitTreatmentId:
      in: path
      name: id
      required: true
      schema:
        format: int64
        minimum: 1
        type: integer
  responses:
    BadRequest:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
      description: Malformed query parameters or request body.
    NotFound:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
      description: Resource not found.
    Unauthorized:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
      description: Missing or invalid bearer token.
    ValidationError:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationError'
      description: Request body failed validation.
  schemas:
    Appointment:
      properties:
        appointment_date_time:
          format: date-time
          type: string
        created_at:
          format: date-time
          type: string
        deleted_at:
          format: date-time
          nullable: true
          type: string
        duration_minutes:
          minimum: 1
          type: integer
        id:
          format: int64
          type: integer
        patient:
          $ref: '#/components/schemas/AppointmentPatient'
        patient_id:
          format: int64
          type: integer
        reason_for_visit:
          nullable: true
          type: string
        status:
          enum:
          - Scheduled
          - Confirmed
          - Completed
          - Cancelled
          type: string
        updated_at:
          format: date-time
          type: string
        user:
          $ref: '#/components/schemas/AppointmentUser'
        user_id:
          format: int64
          type: integer
      required:
      - id
      - patient_id
      - user_id
      - appointment_date_time
      - duration_minutes
      - status
      - created_at
      - updated_at
      type: object
    AppointmentCreate:
      properties:
        appointment_date_time:
          format: date-time
          type: string
        duration_minutes:
          default: 30
          maximum: 600
          minimum: 1
          type: integer
        patient_id:
          format: int64
          minimum: 1
          type: integer
        reason_for_visit:
          type: string
        status:
          default: Scheduled
          enum:
          - Scheduled
          - Confirmed
          - Completed
          - Cancelled
          type: string
        user_id:
          format: int64
          minimum: 1
          type: integer
      required:
      - patient_id
      - user_id
      - appointment_date_time
      type: object
    AppointmentEnvelope:
      properties:
        data:
          $ref: '#/components/schemas/Appointment'
      required:
      - data
      type: object
    AppointmentList:
      properties:
        data:
          items:
            $ref: '#/components/schemas/Appointment'
          type: array
      required:
      - data
      type: object
    AppointmentPatient:
      description: Minimal patient embed used inside appointment responses.
      properties:
        full_name:
          type: string
        id:
          format: int64
          type: integer
      required:
      - id
      - full_name
      type: object
    AppointmentUpdate:
      description: 'Partial merge — only present fields are written. Same nullable

        caveat as PatientUpdate.

        '
      properties:
        appointment_date_time:
          format: date-time
          type: string
        duration_minutes:
          maximum: 600
          minimum: 1
          type: integer
        patient_id:
          format: int64
          minimum: 1
          type: integer
        reason_for_visit:
          nullable: true
          type: string
        status:
          enum:
          - Scheduled
          - Confirmed
          - Completed
          - Cancelled
          type: string
        user_id:
          format: int64
          minimum: 1
          type: integer
      type: object
    AppointmentUser:
      description: Minimal user embed used inside appointment responses.
      properties:
        email:
          format: email
          type: string
        id:
          format: int64
          type: integer
        name:
          type: string
      required:
      - id
      - name
      type: object
    AuthUser:
      properties:
        email:
          format: email
          type: string
        id:
          format: int64
          type: integer
        name:
          type: string
      required:
      - id
      - name
      - email
      type: object
    BoltonAnalysis:
      description: 'Bolton tooth-size ratios computed from the latest measurement per

        tooth. Anterior = sum(33–43 widths)/sum(13–23 widths); overall =

        sum(36–46)/sum(16–26).

        '
      properties:
        anterior:
          $ref: '#/components/schemas/BoltonRatio'
        overall:
          $ref: '#/components/schemas/BoltonRatio'
      required:
      - anterior
      - overall
      type: object
    BoltonRatio:
      properties:
        ideal_percent:
          type: string
        missing_teeth:
          description: FDI codes still lacking a measurement
          items:
            type: integer
          type: array
        ratio_percent:
          description: null until every tooth in the group has a width measured
          nullable: true
          type: string
      required:
      - ideal_percent
      - missing_teeth
      type: object
    Category:
      properties:
        created_at:
          format: date-time
          type: string
        deleted_at:
          format: date-time
          nullable: true
          type: string
        id:
          format: int64
          type: integer
        name:
          maxLength: 255
          type: string
        parent_id:
          format: int64
          type: integer
        slug:
          maxLength: 255
          type: string
        updated_at:
          format: date-time
          type: string
      required:
      - id
      - parent_id
      - name
      - slug
      - created_at
      - updated_at
      type: object
    CategoryCreate:
      properties:
        name:
          maxLength: 255
          minLength: 1
          type: string
        parent_id:
          default: 0
          format: int64
          minimum: 0
          type: integer
        slug:
          maxLength: 255
          type: string
      required:
      - name
      type: object
    CategoryEnvelope:
      properties:
        data:
          $ref: '#/components/schemas/Category'
      required:
      - data
      type: object
    CategoryUpdate:
      properties:
        name:
          maxLength: 255
          minLength: 1
          type: string
        parent_id:
          format: int64
          minimum: 0
          type: integer
        slug:
          maxLength: 255
          type: string
      type: object
    CephalometricAnalysis:
      properties:
        analysis_date:
          format: date
          nullable: true
          type: string
        bjork_sum_degrees:
          nullable: true
          type: string
        conclusions:
          nullable: true
          type: string
        created_at:
          format: date-time
          type: string
        go_gn_length_mm:
          nullable: true
          type: string
        id:
          format: int64
          type: integer
        interincisal_angle:
          nullable: true
          type: string
        n_go_me_degrees:
          nullable: true
          type: string
        nl_ml_degrees:
          nullable: true
          type: string
        patient_id:
          format: int64
          type: integer
        sn_pa_prime:
          nullable: true
          type: string
        sna_degrees:
          nullable: true
          type: string
        snb_degrees:
          nullable: true
          type: string
        snpog_degrees:
          nullable: true
          type: string
        updated_at:
          format: date-time
          type: string
        wits_appraisal_mm:
          nullable: true
          type: string
      required:
      - id
      - patient_id
      - created_at
      - updated_at
      type: object
    CephalometricAnalysisCreate:
      properties:
        analysis_date:
          format: date
          type: string
        bjork_sum_degrees:
          type: string
        conclusions:
          type: string
        go_gn_length_mm:
          type: string
        interincisal_angle:
          type: string
        n_go_me_degrees:
          type: string
        nl_ml_degrees:
          type: string
        patient_id:
          format: int64
          minimum: 1
          type: integer
        sn_pa_prime:
          type: string
        sna_degrees:
          type: string
        snb_degrees:
          type: string
        snpog_degrees:
          type: string
        wits_appraisal_mm:
          type: string
      required:
      - patient_id
      type: object
    CephalometricAnalysisEnvelope:
      properties:
        data:
          $ref: '#/components/schemas/CephalometricAnalysis'
      required:
      - data
      type: object
    CephalometricAnalysisUpdate:
      properties:
        analysis_date:
          format: date
          nullable: true
          type: string
        bjork_sum_degrees:
          nullable: true
          type: string
        conclusions:
          nullable: true
          type: string
        go_gn_length_mm:
          nullable: true
          type: string
        interincisal_angle:
          nullable: true
          type: string
        n_go_me_degrees:
          nullable: true
          type: string
        nl_ml_degrees:
          nullable: true
          type: string
        sn_pa_prime:
          nullable: true
          type: string
        sna_degrees:
          nullable: true
          type: string
        snb_degrees:
          nullable: true
          type: string
        snpog_degrees:
          nullable: true
          type: string
        wits_appraisal_mm:
          nullable: true
          type: string
      type: object
    DiagnosticAsset:
      properties:
        created_at:
          format: date-time
          type: string
        has_biometry:
          type: boolean
        has_cbct:
          type: boolean
        has_optg:
          type: boolean
        has_photos:
          type: boolean
        has_trg:
          type: boolean
        id:
          format: int64
          type: integer
        patient_id:
          format: int64
          type: integer
        updated_at:
          format: date-time
          type: string
      required:
      - id
      - patient_id
      - has_optg
      - has_trg
      - has_cbct
      - has_biometry
      - has_photos
      - created_at
      - updated_at
      type: object
    DiagnosticAssetCreate:
      properties:
        has_biometry:
          default: false
          type: boolean
        has_cbct:
          default: false
          type: boolean
        has_optg:
          default: false
          type: boolean
        has_photos:
          default: false
          type: boolean
        has_trg:
          default: false
          type: boolean
        patient_id:
          format: int64
          minimum: 1
          type: integer
      required:
      - patient_id
      type: object
    DiagnosticAssetEnvelope:
      properties:
        data:
          $ref: '#/components/schemas/DiagnosticAsset'
      required:
      - data
      type: object
    DiagnosticAssetUpdate:
      properties:
        has_biometry:
          type: boolean
        has_cbct:
          type: boolean
        has_optg:
          type: boolean
        has_photos:
          type: boolean
        has_trg:
          type: boolean
      type: object
    DoctorAppointmentStats:
      description: 'All-time counters for the logged-in doctor. missed = past

        appointments still Scheduled/Confirmed (never completed or

        cancelled); upcoming = future Scheduled/Confirmed.

        '
      properties:
        cancelled:
          format: int64
          type: integer
        completed:
          format: int64
          type: integer
        missed:
          format: int64
          type: integer
        total:
          format: int64
          type: integer
        upcoming:
          format: int64
          type: integer
      required:
      - total
      - completed
      - upcoming
      - missed
      - cancelled
      type: object
    Error:
      properties:
        message:
          description: Human-readable error message.
          type: string
      required:
      - message
      type: object
    Invoice:
      properties:
        amount_paid:
          description: Decimal as string with 2-fraction precision.
          example: '500.00'
          type: string
        appointment:
          $ref: '#/components/schemas/InvoiceAppointment'
        appointment_id:
          format: int64
          type: integer
        created_at:
          format: date-time
          type: string
        deleted_at:
          format: date-time
          nullable: true
          type: string
        id:
          format: int64
          type: integer
        invoice_date:
          format: date
          type: string
        payment_status:
          enum:
          - Pending
          - Paid
          - Partial
          type: string
        remaining_balance:
          description: Computed accessor — `total_amount` − `amount_paid`. Read-only.
          example: '1000.00'
          readOnly: true
          type: string
        total_amount:
          description: Decimal as string with 2-fraction precision. Matches Laravel's `decimal:2` cast.
          example: '1500.00'
          type: string
        updated_at:
          format: date-time
          type: string
      required:
      - id
      - appointment_id
      - invoice_date
      - total_amount
      - amount_paid
      - payment_status
      - remaining_balance
      - created_at
      - updated_at
      type: object
    InvoiceAppointment:
      description: Minimal appointment embed used inside invoice responses.
      properties:
        appointment_date_time:
          format: date-time
          type: string
        id:
          format: int64
          type: integer
        patient:
          $ref: '#/components/schemas/AppointmentPatient'
      required:
      - id
      - appointment_date_time
      type: object
    InvoiceCreate:
      properties:
        amount_paid:
          default: '0.00'
          description: Decimal as string. Must be 0 ≤ amount_paid ≤ total_amount.
          type: string
        appointment_id:
          format: int64
          minimum: 1
          type: integer
        invoice_date:
          format: date
          type: string
        payment_status:
          default: Pending
          enum:
          - Pending
          - Paid
          - Partial
          type: string
        total_amount:
          description: Decimal as string, up to 2 fraction digits. Must be ≥ 0.
          type: string
      required:
      - appointment_id
      - invoice_date
      - total_amount
      type: object
    InvoiceEnvelope:
      properties:
        data:
          $ref: '#/components/schemas/Invoice'
      required:
      - data
      type: object
    InvoiceUpdate:
      description: 'Partial merge — only present fields are written. Same nullable

        caveat as PatientUpdate / AppointmentUpdate.

        '
      properties:
        amount_paid:
          type: string
        invoice_date:
          format: date
          type: string
        payment_status:
          enum:
          - Pending
          - Paid
          - Partial
          type: string
        total_amount:
          type: string
      type: object
    LoginRequest:
      properties:
        password:
          format: password
          minLength: 1
          type: string
        username:
          description: User's email address. Named `username` to match Laravel's login input.
          example: doctor@example.com
          type: string
      required:
      - username
      - password
      type: object
    LoginResponse:
      properties:
        access_token:
          description: 'Signed JWT (HS256). Use as `Authorization: Bearer <token>`.'
          type: string
        expires_in:
          description: Seconds remaining until the token expires.
          type: integer
        token_type:
          enum:
          - Bearer
          type: string
        user:
          $ref: '#/components/schemas/AuthUser'
      required:
      - access_token
      - token_type
      - expires_in
      - user
      type: object
    MechanotherapyVisit:
      properties:
        created_at:
          format: date-time
          type: string
        doctor_signature:
          description: legacy free text; performed_by is the trusted field
          maxLength: 100
          nullable: true
          type: string
        id:
          format: int64
          type: integer
        patient_id:
          format: int64
          type: integer
        performed_by:
          description: clinician user id
          format: int64
          nullable: true
          type: integer
        procedure_notes:
          nullable: true
          type: string
        recommendations:
          nullable: true
          type: string
        updated_at:
          format: date-time
          type: string
        visit_date:
          format: date
          type: string
      required:
      - id
      - patient_id
      - visit_date
      - created_at
      - updated_at
      type: object
    MechanotherapyVisitCreate:
      properties:
        doctor_signature:
          maxLength: 100
          type: string
        patient_id:
          format: int64
          minimum: 1
          type: integer
        procedure_notes:
          type: string
        recommendations:
          type: string
        visit_date:
          description: defaults to today
          format: date
          type: string
      required:
      - patient_id
      type: object
    MechanotherapyVisitEnvelope:
      properties:
        data:
          $ref: '#/components/schemas/MechanotherapyVisit'
      required:
      - data
      type: object
    MechanotherapyVisitUpdate:
      properties:
        doctor_signature:
          maxLength: 100
          nullable: true
          type: string
        procedure_notes:
          nullable: true
          type: string
        recommendations:
          nullable: true
          type: string
        visit_date:
          format: date
          type: string
      type: object
    MedicalHistory:
      properties:
        condition_name:
          maxLength: 255
          type: string
        created_at:
          format: date-time
          type: string
        deleted_at:
          format: date-time
          nullable: true
          type: string
        id:
          format: int64
          type: integer
        notes:
          nullable: true
          type: string
        patient_id:
          format: int64
          type: integer
        updated_at:
          format: date-time
          type: string
      required:
      - id
      - patient_id
      - condition_name
      - created_at
      - updated_at
      type: object
    MedicalHistoryCreate:
      properties:
        condition_name:
          maxLength: 255
          minLength: 1
          type: string
        notes:
          type: string
        patient_id:
          format: int64
          minimum: 1
          type: integer
      required:
      - patient_id
      - condition_name
      type: object
    MedicalHistoryEnvelope:
      properties:
        data:
          $ref: '#/components/schemas/MedicalHistory'
      required:
      - data
      type: object
    MedicalHistoryUpdate:
      properties:
        condition_name:
          maxLength: 255
          minLength: 1
          type: string
        notes:
          nullable: true
          type: string
      type: object
    OrthodonticsMedicalHistory:
      properties:
        biometric_findings:
          nullable: true
          type: string
        created_at:
          format: date-time
          type: string
        deleted_at:
          format: date-time
          nullable: true
          type: string
        ent_pathology:
          nullable: true
          type: string
        functional_disturbances:
          nullable: true
          type: string
        id:
          format: int64
          type: integer
        main_complaints:
          nullable: true
          type: string
        patient_id:
          format: int64
          type: integer
        postural_disturbances:
          nullable: true
          type: string
        treatment_plan:
          nullable: true
          type: string
        updated_at:
          format: date-time
          type: string
      required:
      - id
      - patient_id
      - created_at
      - updated_at
      type: object
    OrthodonticsMedicalHistoryCreate:
      properties:
        biometric_findings:
          type: string
        ent_pathology:
          type: string
        functional_disturbances:
          type: string
        main_complaints:
          type: string
        patient_id:
          format: int64
          minimum: 1
          type: integer
        postural_disturbances:
          type: string
        treatment_plan:
          type: string
      required:
      - patient_id
      type: object
    OrthodonticsMedicalHistoryEnvelope:
      properties:
        data:
          $ref: '#/components/schemas/OrthodonticsMedicalHistory'
      required:
      - data
      type: object
    OrthodonticsMedicalHistoryUpdate:
      properties:
        biometric_findings:
          nullable: true
          type: string
        ent_pathology:
          nullable: true
          type: string
        functional_disturbances:
          nullable: true
          type: string
        main_complaints:
          nullable: true
          type: string
        postural_disturbances:
          nullable: true
          type: string
        treatment_plan:
          nullable: true
          type: string
      type: object
    PaginatedAppointments:
      properties:
        data:
          items:
            $ref: '#/components/schemas/Appointment'
          type: array
        meta:
          $ref: '#/components/schemas/PaginationMeta'
      required:
      - data
      - meta
      type: object
    PaginatedCategories:
      properties:
        data:
          items:
            $ref: '#/components/schemas/Category'
          type: array
        meta:
          $ref: '#/components/schemas/PaginationMeta'
      required:
      - data
      - meta
      type: object
    PaginatedCephalometricAnalyses:
      properties:
        data:
          items:
            $ref: '#/components/schemas/CephalometricAnalysis'
          type: array
        meta:
          $ref: '#/components/schemas/PaginationMeta'
      required:
      - data
      - meta
      type: object
    PaginatedDiagnosticAssets:
      properties:
        data:
          items:
            $ref: '#/components/schemas/DiagnosticAsset'
          type: array
        meta:
          $ref: '#/components/schemas/PaginationMeta'
      required:
      - data
      - meta
      type: object
    PaginatedInvoices:
      properties:
        data:
          items:
            $ref: '#/components/schemas/Invoice'
          type: array
        meta:
          $ref: '#/components/schemas/PaginationMeta'
      required:
      - data
      - meta
      type: object
    PaginatedMechanotherapyVisits:
      properties:
        data:
          items:
            $ref: '#/components/schemas/MechanotherapyVisit'
          type: array
        meta:
          $ref: '#/components/schemas/PaginationMeta'
      required:
      - data
      - meta
      type: object
    PaginatedMedicalHistory:
      properties:
        data:
          items:
            $ref: '#/components/schemas/MedicalHistory'
          type: array
        meta:
          $ref: '#/components/schemas/PaginationMeta'
      required:
      - data
      - meta
      type: object
    PaginatedOrthodonticsMedicalHistories:
      properties:
        data:
          items:
            $ref: '#/components/schemas/OrthodonticsMedicalHistory'
          type: array
        meta:
          $ref: '#/components/schemas/PaginationMeta'
      required:
      - data
      - meta
      type: object
    PaginatedPatients:
      properties:
        data:
          items:
            $ref: '#/components/schemas/Patient'
          type: array
        meta:
