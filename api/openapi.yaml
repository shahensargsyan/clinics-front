              schema:
                $ref: '#/components/schemas/CategoryEnvelope'
          description: created
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
      tags:
      - Categories
  /categories/{id}:
    delete:
      operationId: DeleteCategory
      responses:
        '204':
          description: deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      tags:
      - Categories
    get:
      operationId: GetCategory
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryEnvelope'
          description: ok
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      tags:
      - Categories
    parameters:
    - $ref: '#/components/parameters/CategoryId'
    put:
      operationId: UpdateCategory
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryUpdate'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryEnvelope'
          description: ok
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
      tags:
      - Categories
  /cephalometric-analyses:
    get:
      operationId: ListCephalometricAnalyses
      parameters:
