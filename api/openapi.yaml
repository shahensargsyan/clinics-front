          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCategories'
          description: ok
        '401':
          $ref: '#/components/responses/Unauthorized'
      summary: List categories with pagination/search/sort.
      tags:
      - Categories
    post:
      operationId: CreateCategory
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryCreate'
        required: true
      responses:
        '201':
